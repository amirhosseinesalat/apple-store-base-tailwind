<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apple store</title>
    <link rel="stylesheet" href="../dist/output.css" />
    <link rel="stylesheet" href="./font.css" />
  </head>
  <body>
    <div class="h-13 md:h-[70px] bg-primary flex items-center justify-center">
      <p class="text-sm md:text-base text-white font-semibold">
        تا ۷۰٪ تخفیف برای لوازم جانبی اورجینال آیفون
      </p>
    </div>
    <div class="flex flex-row justify-around mt-16">
      <img src="./assets/svg/hamburger.svg" alt="menu" class="w-6 h-4 mt-3" />
      <div class="flex flex-row">
        <img src="./assets/svg/app-store.svg" alt="logo" class="w-11 h-11" />
        <div class="mr-1.5">
          <p class="text-base font-semibold text-primary">اپل</p>
          <span class="text-base font-semibold text-primary">استور</span>
        </div>
      </div>
      <div class="flex flex-row mt-2 gap-2">
        <img src="./assets/svg/shopping-cart.svg" alt="cart" class="size-5" />
        <img src="./assets/svg/heart.svg" alt="heart" class="size-5" />
      </div>
    </div>
    <div class="flex flex-row justify-between bg-lightGray w-[350px] h-full p-4  rounded-4xl mr-10 mt-5" >
      <input type="text" placeholder="جستجو کنید" />
      <img src="./assets/svg/search-normal.svg" alt="search" />
    </div>
  </body>
</html>
